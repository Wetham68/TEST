<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIT Roadmap — My Checklist</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e10;
            --surface: #18181c;
            --surface2: #1f1f25;
            --border: rgba(255, 255, 255, 0.07);
            --border2: rgba(255, 255, 255, 0.12);
            --text: #f0f0f0;
            --muted: #888;
            --hint: #555;
            --green: #00e5a0;
            --green-dim: rgba(0, 229, 160, 0.12);
            --green-border: rgba(0, 229, 160, 0.3);
            --blue: #5b9cf6;
            --blue-dim: rgba(91, 156, 246, 0.12);
            --amber: #f5a623;
            --amber-dim: rgba(245, 166, 35, 0.12);
            --purple: #a78bfa;
            --purple-dim: rgba(167, 139, 250, 0.12);
            --red: #f87171;
            --red-dim: rgba(248, 113, 113, 0.12);
            --pink: #f472b6;
            --pink-dim: rgba(244, 114, 182, 0.12);
            --teal: #2dd4bf;
            --teal-dim: rgba(45, 212, 191, 0.12);
            --gray-dim: rgba(150, 150, 150, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            padding: 0;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding: 2.5rem 2rem 2rem;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
            backdrop-filter: blur(12px);
        }

        .header-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }

        h1 {
            font-size: clamp(1.4rem, 3vw, 2rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        h1 span {
            color: var(--green);
        }

        .subtitle {
            font-size: 13px;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            margin-top: 4px;
        }

        .progress-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .progress-track {
            flex: 1;
            height: 3px;
            background: var(--border2);
            border-radius: 99px;
            overflow: hidden;
            max-width: 300px;
        }

        .progress-fill {
            height: 100%;
            background: var(--green);
            border-radius: 99px;
            transition: width 0.4s cubic-bezier(.4, 0, .2, 1);
            width: 0%;
        }

        .progress-text {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            white-space: nowrap;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            font-weight: 500;
            padding: 3px 9px;
            border-radius: 99px;
            . letter-spacing: 0.03em;
            white-space: nowrap;
        }

        .tag-build {
            background: var(--green-dim);
            color: var(--green);
            border: 1px solid var(--green-border);
        }

        .tag-cert {
            background: var(--blue-dim);
            color: var(--blue);
            border: 1px solid rgba(91, 156, 246, 0.25);
        }

        .tag-compete {
            background: var(--amber-dim);
            color: var(--amber);
            border: 1px solid rgba(245, 166, 35, 0.25);
        }

        .tag-school {
            background: var(--purple-dim);
            color: var(--purple);
            border: 1px solid rgba(167, 139, 250, 0.25);
        }

        .tag-grades {
            background: var(--red-dim);
            color: var(--red);
            border: 1px solid rgba(248, 113, 113, 0.25);
        }

        .tag-research {
            background: var(--pink-dim);
            color: var(--pink);
            border: 1px solid rgba(244, 114, 182, 0.25);
        }

        .tag-hack {
            background: var(--teal-dim);
            color: var(--teal);
            border: 1px solid rgba(45, 212, 191, 0.25);
        }

        .tag-apply {
            background: var(--gray-dim);
            color: #aaa;
            border: 1px solid rgba(150, 150, 150, 0.2);
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
        }

        .phase {
            margin-bottom: 3rem;
        }

        .phase-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.2rem;
        }

        .phase-title {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .phase-meta {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--hint);
            margin-left: auto;
        }

        .phase-progress {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        .columns {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 12px;
        }

        .col {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.1rem 1.2rem;
            transition: border-color 0.2s;
        }

        .col:hover {
            border-color: var(--border2);
        }

        .col-header {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--hint);
            text-transform: uppercase;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .item:hover {
            opacity: 0.85;
        }

        .cb-wrap {
            margin-top: 2px;
            flex-shrink: 0;
            width: 16px;
            height: 16px;
            border: 1.5px solid var(--hint);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
        }

        .item.done .cb-wrap {
            background: var(--green);
            border-color: var(--green);
        }

        .cb-wrap svg {
            display: none;
            width: 10px;
            height: 10px;
        }

        .item.done .cb-wrap svg {
            display: block;
        }

        input[type=checkbox] {
            position: absolute;
            opacity: 0;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .item-label {
            flex: 1;
        }

        .item-text {
            font-size: 13px;
            line-height: 1.45;
            color: var(--text);
            transition: color 0.2s;
        }

        .item.done .item-text {
            color: var(--hint);
            text-decoration: line-through;
            text-decoration-color: var(--hint);
        }

        .item-tag {
            margin-top: 4px;
        }

        .reset-btn {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--hint);
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 12px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }

        .reset-btn:hover {
            color: var(--red);
            border-color: rgba(248, 113, 113, 0.4);
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--hint);
            border-top: 1px solid var(--border);
        }

        @media (max-width: 600px) {
            header {
                padding: 1.5rem 1rem 1rem;
            }

            main {
                padding: 1rem;
            }

            .columns {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

        const STORAGE_KEY = 'mit_roadmap_v1';

        function load() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            } catch (e) {
                return {};
            }
        }

        function save(state) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            } catch (e) {}
        }

        function updateProgress() {
            const all = document.querySelectorAll('.item');
            const done = document.querySelectorAll('.item.done');
            const pct = all.length ? Math.round(done.length / all.length * 100) : 0;
            document.getElementById('prog-fill').style.width = pct + '%';
            document.getElementById('prog-text').textContent = done.length + ' / ' + all.length + ' complete';
        }

        function resetAll() {
            if (!confirm('Reset all checkboxes?')) return;
            document.querySelectorAll('.item').forEach(el => el.classList.remove('done'));
            document.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false);
            save({});
            updateProgress();
        }

        let idCounter = 0;
        const state = load();

        // Legend
        const legend = document.getElementById('legend');
        Object.entries(TAGS).forEach(([key, t]) => {
            const s = document.createElement('span');
            s.className = 'tag ' + t.cls;
            s.textContent = t.label;
            legend.appendChild(s);
        });

        // Phases
        const main = document.getElementById('main');
        data.forEach(phase => {
            const phaseEl = document.createElement('div');
            phaseEl.className = 'phase';

            const header = document.createElement('div');
            header.className = 'phase-header';
            header.innerHTML = `
    <span class="tag ${TAGS[phase.badgeTag].cls}">${phase.badge}</span>
    <span class="phase-title">${phase.phase}</span>
  `;
            phaseEl.appendChild(header);

            const cols = document.createElement('div');
            cols.className = 'columns';

            phase.columns.forEach(col => {
                const colEl = document.createElement('div');
                colEl.className = 'col';

                const colHead = document.createElement('div');
                colHead.className = 'col-header';
                colHead.textContent = col.title;
                colEl.appendChild(colHead);

                col.items.forEach(item => {
                    const id = 'cb-' + (idCounter++);
                    const isDone = !!state[id];

                    const row = document.createElement('div');
                    row.className = 'item' + (isDone ? ' done' : '');

                    row.innerHTML = `
        <div class="cb-wrap">
          <input type="checkbox" id="${id}" ${isDone ? 'checked' : ''}>
          <svg viewBox="0 0 10 10" fill="none">
            <polyline points="1.5,5 4,7.5 8.5,2" stroke="#0e0e10" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <label class="item-label" for="${id}">
          <div class="item-text">${item.text}</div>
          <div class="item-tag"><span class="tag ${TAGS[item.tag].cls}">${TAGS[item.tag].label}</span></div>
        </label>
      `;

                    const cb = row.querySelector('input');
                    cb.addEventListener('change', () => {
                        row.classList.toggle('done', cb.checked);
                        const s = load();
                        if (cb.checked) s[id] = true;
                        else delete s[id];
                        save(s);
                        updateProgress();
                    });

                    colEl.appendChild(row);
                });

                cols.appendChild(colEl);
            });

            phaseEl.appendChild(cols);
            main.appendChild(phaseEl);
        });

        updateProgress();
    </script>
